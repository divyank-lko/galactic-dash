name: Build Galactic Dash APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle directly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.0-bin.zip -O gradle.zip
          unzip -q gradle.zip
          echo "$PWD/gradle-8.0/bin" >> $GITHUB_PATH

      - name: Move game file to assets
        run: mkdir -p app/src/main/assets && cp galactic-dash.html app/src/main/assets/

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: galactic-dash-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
